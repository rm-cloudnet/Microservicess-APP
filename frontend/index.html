<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { padding: 10px; width: 100%; margin-top: 10px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 10px; background: #eee; margin-top: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>My Cluster Tasks</h2>
        <input type="text" id="taskInput" placeholder="Enter a new task...">
        <button onclick="addTask()">Add Task</button>
        <ul id="taskList"></ul>
    </div>

    <script>
        // In Kubernetes, the frontend container serves static files,
        // but JavaScript runs in the browser. We will use a relative route
        // or let Kubernetes reverse-proxy handles this. 
        // For now, it dynamically hits the backend path.
        const API_URL = '/api/tasks';

        async function fetchTasks() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                const list = document.getElementById('taskList');
                list.innerHTML = '';
                data.forEach(t => {
                    const li = document.createElement('li');
                    li.textContent = t.title;
                    list.appendChild(li);
                });
            } catch (err) { console.error("Error fetching tasks:", err); }
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            if(!input.value) return;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: input.value })
                });
                input.value = '';
                fetchTasks();
            } catch (err) { console.error("Error adding task:", err); }
        }
        setInterval(fetchTasks, 3000);
        fetchTasks();
    </script>
</body>
</html>
