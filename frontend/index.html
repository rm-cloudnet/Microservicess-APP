<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Task Tracker</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f4f9; }
        .container { max-width: 500px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input, button { padding: 10px; width: 100%; margin-top: 10px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; cursor: pointer; }
        
        h3 { margin-top: 25px; color: #333; border-bottom: 2px solid #eee; padding-bottom: 5px; }
        ul { list-style-type: none; padding: 0; }
        
        .task-item { display: flex; align-items: center; padding: 10px; margin-top: 5px; border-radius: 4px; }
        .task-item input { width: auto; margin-top: 0; margin-right: 10px; cursor: pointer; }
        
        .current-task { background: #d4edda; color: #155724; border-left: 5px solid #28a745; font-weight: bold; }
        .past-task { background: #f8f9fa; color: #6c757d; border-left: 5px solid #6c757d; text-decoration: line-through; }
        
        .empty-message { color: #999; font-style: italic; font-size: 14px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>My Tasks</h2>
        <input type="text" id="taskInput" placeholder="Enter a new task...">
        <button onclick="addTask()">Add Task</button>

        <h3>Latest Active Tasks</h3>
        <ul id="currentTaskList"></ul>

        <h3>Tasks Previously Added (Cache History)</h3>
        <ul id="previousTaskList"></ul>
    </div>

    <script>
        const API_URL = '/api/tasks';

        async function fetchTasks() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                const currentList = document.getElementById('currentTaskList');
                const previousList = document.getElementById('previousTaskList');
                
                currentList.innerHTML = '';
                previousList.innerHTML = '';

                // Filter tasks based on their checked state
                const activeTasks = data.filter(t => !t.completed);
                const historicalTasks = data.filter(t => t.completed).reverse();

                // 1. Render Active Tasks
                if (activeTasks.length === 0) {
                    currentList.innerHTML = '<li class="empty-message">No active tasks.</li>';
                } else {
                    activeTasks.forEach(t => {
                        const li = document.createElement('li');
                        li.className = 'task-item current-task';
                        li.innerHTML = `
                            <input type="checkbox" onchange="toggleStatus('${t.id}', true)">
                            <span>${t.title}</span>
                        `;
                        currentList.appendChild(li);
                    });
                }

                // 2. Render Unchecked/Completed Tasks (History Cache)
                if (historicalTasks.length === 0) {
                    previousList.innerHTML = '<li class="empty-message">No history cached.</li>';
                } else {
                    historicalTasks.forEach(t => {
                        const li = document.createElement('li');
                        li.className = 'task-item past-task';
                        li.innerHTML = `
                            <input type="checkbox" checked onchange="toggleStatus('${t.id}', false)">
                            <span>${t.title}</span>
                        `;
                        previousList.appendChild(li);
                    });
                }
            } catch (err) { console.error("Error fetching tasks:", err); }
        }

        async function addTask() {
            const input = document.getElementById('taskInput');
            if(!input.value) return;
            try {
                await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title: input.value })
                });
                input.value = '';
                fetchTasks();
            } catch (err) { console.error("Error adding task:", err); }
        }

        async function toggleStatus(id, isCompleted) {
            try {
                await fetch(`${API_URL}/${id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: isCompleted })
                });
                fetchTasks();
            } catch (err) { console.error("Error updating status:", err); }
        }

        setInterval(fetchTasks, 3000);
        fetchTasks();
    </script>
</body>
</html>
